<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>miira</title>
  <meta name="description" content="iOS developer." />
  <style>
    :root {
      --bg: #FFF8F0;
      --surface: #FEF4E8;
      --text: #2E1F0E;
      --text-secondary: #68543A;
      --primary: #F4A622;
      --border: rgba(244, 166, 34, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1508;
        --surface: #271F13;
        --text: #F5EEE4;
        --text-secondary: #B5AA9B;
        --primary: #F5B438;
        --border: rgba(244, 166, 34, 0.2);
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .name {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--primary);
      line-height: 1.1;
    }

    .role {
      margin-top: 10px;
      font-size: 1rem;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--border);
      margin: 32px auto;
      border-radius: 2px;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 16px;
      text-align: left;
    }

    .projects {
      margin-bottom: 48px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      text-align: left;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .card:hover .card-title {
      color: var(--primary);
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      transition: color 0.15s ease;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 56px;
    }

    .links a {
      font-size: 0.9rem;
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
    }

    .links a:hover {
      border-bottom-color: var(--primary);
    }

    footer {
      font-size: 0.8rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="name">miira</div>
    <div class="role">iOS developer</div>

    <div class="divider"></div>

    <div class="projects">
      <div class="section-label">Projects</div>
      <a class="card" href="https://miiraheart.github.io/lucciola/">
        <div class="card-title">Lucciola</div>
        <div class="card-desc">A native iOS client for Firefly III.</div>
      </a>
    </div>

    <div class="links">
      <a href="mailto:lucciola@miira.me">Contact</a>
      <a href="https://github.com/miiraheart">GitHub</a>
    </div>

    <footer>2026</footer>

  </div>
</body>
</html>
